# Shared storage for originals + resized wallpapers (server + workers).
# ReadWriteMany is required when workers run on multiple nodes.
# ceph-rbd (default) is RWO only — CephFS is required for RWX.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wallpaper-uploads
  labels:
    app.kubernetes.io/part-of: wallpaper-demo
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ocs-external-storagecluster-cephfs
  resources:
    requests:
      storage: 5Gi
